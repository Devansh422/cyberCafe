name: release

# Tag-driven release: push a tag like `v0.1.0` to build the Windows installer,
# sign it, publish a GitHub Release, and emit the updater manifest (latest.json)
# that installed copies poll via tauri-plugin-updater.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install root deps (Tauri CLI)
        run: npm install

      - name: Install frontend deps
        run: npm --prefix frontend install

      - name: Build & package the WhatsApp sidecar (.exe)
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: |
          npm --prefix whatsapp-sidecar install
          npm --prefix whatsapp-sidecar run package
          if (-not (Test-Path dist/whatsapp-sidecar.exe)) { throw "sidecar exe not produced" }
        shell: pwsh

      - name: Fetch SumatraPDF print engine
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $ver = "3.5.2"
          $url = "https://www.sumatrapdfreader.org/dl/rel/$ver/SumatraPDF-$ver-64.zip"
          Invoke-WebRequest $url -OutFile sumatra.zip
          Expand-Archive sumatra.zip -DestinationPath sumatra -Force
          Copy-Item (Get-ChildItem sumatra -Filter *.exe)[0].FullName dist/SumatraPDF.exe -Force
        shell: pwsh

      # Bundle the Visual C++ runtime app-locally (next to the exe) so the app
      # loads on a clean Windows with no VC++ Redistributable installed. Rust's
      # MSVC build links these dynamically, and onnxruntime (ort) needs the C++
      # runtime too. Copying from the runner's System32 matches the MSVC toolchain
      # that builds the binary. These are app-local DLLs, so they never touch the
      # user's system. (WebView2 itself is handled by `webviewInstallMode:
      # offlineInstaller`, which Tauri auto-downloads and bundles at build time.)
      - name: Stage Visual C++ runtime DLLs
        run: |
          New-Item -ItemType Directory -Force -Path dist/vcruntime | Out-Null
          $dlls = "vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll"
          foreach ($dll in $dlls) {
            $src = Join-Path $env:WINDIR "System32\$dll"
            if (-not (Test-Path $src)) { throw "VC++ runtime DLL not found: $src" }
            Copy-Item $src "dist/vcruntime/$dll" -Force
          }
          Get-ChildItem dist/vcruntime | Format-Table Name, Length
        shell: pwsh

      # Ship Microsoft's OFFICIAL ONNX Runtime DLL instead of ort's
      # `download-binaries` prebuilt. pyke's prebuilt is AVX2-only and crashes
      # with STATUS_ILLEGAL_INSTRUCTION (0xc000001d) on CPUs without AVX2 (old /
      # budget machines). Microsoft's build does runtime CPU dispatch with an
      # SSE2 fallback, so it runs on any x64 CPU. v1.24.x matches `ort`
      # 2.0.0-rc.12 (api-24). The app loads it at runtime via ORT_DYLIB_PATH
      # (set in src-tauri/src/main.rs); see crates/ratan-core/Cargo.toml.
      - name: Stage Microsoft ONNX Runtime DLL
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $ver = "1.24.4"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$ver/onnxruntime-win-x64-$ver.zip"
          Invoke-WebRequest $url -OutFile ort.zip
          Expand-Archive ort.zip -DestinationPath ort -Force
          $dll = Get-ChildItem ort -Recurse -Filter onnxruntime.dll | Select-Object -First 1
          if (-not $dll) { throw "onnxruntime.dll not found in $url" }
          Copy-Item $dll.FullName dist/onnxruntime.dll -Force
          "{0:N1} MB  dist/onnxruntime.dll" -f ((Get-Item dist/onnxruntime.dll).Length/1MB)
        shell: pwsh

      # tauri-action builds + signs the NSIS installer and, with
      # `createUpdaterArtifacts: true` in tauri.conf.json, also produces and
      # uploads `latest.json` + the `.sig` to the release it creates. It is the
      # single source of truth for the release — do not add a second
      # release-uploading step (a previous softprops/action-gh-release step both
      # used the wrong path — the build output lives at the workspace-root
      # `target/`, not `src-tauri/target/` — and deleted this draft along with
      # its assets).
      - name: Build, sign & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ratan ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
